<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETI PRO - Gestão Inteligente</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: '#7c3aed',
                        'brand-light': '#a78bfa',
                        accent: '#10b981',
                        'bg-dark': '#050505',
                        'card-dark': '#111111',
                        'sidebar-dark': '#0a0a0a',
                        border: 'rgba(255, 255, 255, 0.08)',
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #050505; color: white; }
        .glass-card { background: #111; border: 1px solid rgba(255,255,255,0.08); border-radius: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); backdrop-filter: blur(12px); }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 1rem; padding: 1rem 1.5rem; outline: none; transition: all 0.3s; width: 100%; }
        .input-field:focus { border-color: #7c3aed; box-shadow: 0 0 0 2px rgba(124,58,237,0.2); }
        .btn-primary { background: #7c3aed; color: white; font-weight: 700; padding: 1rem 2rem; border-radius: 1rem; transition: all 0.3s; box-shadow: 0 10px 15px -3px rgba(124,58,237,0.3); }
        .btn-primary:hover { background: #a78bfa; transform: translateY(-2px); }
        .btn-primary:active { transform: scale(0.95); }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="antialiased font-sans selection:bg-brand/30 selection:text-white">

    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-brand/20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-accent/10 blur-[120px] rounded-full"></div>
        
        <div class="glass-card p-12 w-full max-w-md text-center relative z-10">
            <div class="w-24 h-24 bg-brand/10 rounded-3xl flex items-center justify-center mx-auto mb-8 rotate-3">
                <i data-lucide="trending-up" class="w-12 h-12 text-brand"></i>
            </div>
            <h2 class="text-5xl font-display font-extrabold mb-2 italic tracking-tighter uppercase">ETI PRO</h2>
            <p class="text-gray-400 mb-10 font-medium">Gestão Inteligente & Financeiro</p>
            <button onclick="login()" class="w-full bg-white text-black font-bold py-5 rounded-2xl hover:bg-gray-100 transition-all flex items-center justify-center gap-4 shadow-xl active:scale-95">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6 h-6" alt="Google">
                Acessar Painel
            </button>
        </div>
    </div>

    <!-- App Layout (Hidden by default) -->
    <div id="app-layout" class="hidden min-h-screen flex flex-col lg:flex-row">
        
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-50 w-80 bg-sidebar-dark border-r border-border p-8 transform -translate-x-full lg:translate-x-0 transition-transform duration-500 ease-out">
            <div class="flex items-center justify-between mb-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-brand rounded-xl flex items-center justify-center shadow-lg shadow-brand/30">
                        <i data-lucide="trending-up" class="w-6 h-6 text-white"></i>
                    </div>
                    <h2 class="text-3xl font-display font-black text-white tracking-tighter italic uppercase">ETI PRO</h2>
                </div>
                <button onclick="toggleSidebar(false)" class="lg:hidden text-gray-400 hover:text-white">
                    <i data-lucide="x" class="w-7 h-7"></i>
                </button>
            </div>
            
            <nav class="space-y-4">
                <button onclick="showScreen('dashboard')" class="nav-btn w-full flex items-center gap-4 px-6 py-5 rounded-2xl transition-all font-semibold text-gray-500 hover:bg-white/5 hover:text-white" data-screen="dashboard">
                    <i data-lucide="layout-dashboard" class="w-6 h-6"></i> Dashboard
                </button>
                <button onclick="showScreen('clientes')" class="nav-btn w-full flex items-center gap-4 px-6 py-5 rounded-2xl transition-all font-semibold text-gray-500 hover:bg-white/5 hover:text-white" data-screen="clientes">
                    <i data-lucide="users" class="w-6 h-6"></i> Clientes
                </button>
                <button onclick="showScreen('financeiro')" class="nav-btn w-full flex items-center gap-4 px-6 py-5 rounded-2xl transition-all font-semibold text-gray-500 hover:bg-white/5 hover:text-white" data-screen="financeiro">
                    <i data-lucide="circle-dollar-sign" class="w-6 h-6"></i> Financeiro
                </button>
                
                <div class="pt-16">
                    <div class="p-5 bg-white/5 border border-border rounded-3xl mb-6 flex items-center gap-4">
                        <img id="user-photo" src="" class="w-12 h-12 rounded-2xl border-2 border-brand/20" alt="Avatar">
                        <div class="overflow-hidden">
                            <p id="user-name" class="text-sm font-bold text-white truncate"></p>
                            <p id="user-email" class="text-xs text-gray-500 truncate"></p>
                        </div>
                    </div>
                    <button onclick="logout()" class="w-full flex items-center gap-4 px-6 py-5 rounded-2xl hover:bg-red-500/10 text-red-400 transition-all font-semibold">
                        <i data-lucide="log-out" class="w-6 h-6"></i> Sair
                    </button>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6 lg:p-16 overflow-auto relative">
            <div class="absolute top-0 right-0 w-[30%] h-[30%] bg-brand/5 blur-[100px] rounded-full pointer-events-none"></div>
            
            <header class="flex items-center justify-between mb-12 lg:mb-16">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar(true)" class="lg:hidden p-4 bg-card-dark rounded-2xl border border-border">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <div>
                        <h1 id="screen-title" class="text-4xl lg:text-5xl font-display font-black tracking-tight uppercase italic">Dashboard</h1>
                        <p id="welcome-msg" class="text-gray-500 font-medium mt-1"></p>
                    </div>
                </div>
                <div class="hidden md:flex items-center gap-4">
                    <div class="flex items-center gap-2 bg-accent/10 text-accent px-5 py-2.5 rounded-full text-sm font-bold border border-accent/20">
                        <span class="w-2.5 h-2.5 bg-accent rounded-full animate-pulse"></span>
                        Sistema Online
                    </div>
                </div>
            </header>

            <!-- Screens -->
            <div id="screens-container">
                
                <!-- Dashboard Screen -->
                <section id="screen-dashboard" class="screen space-y-12">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div class="glass-card p-10 relative overflow-hidden group">
                            <i data-lucide="dollar-sign" class="absolute top-0 right-0 p-6 opacity-5 w-24 h-24"></i>
                            <div class="w-12 h-12 bg-brand/10 rounded-2xl flex items-center justify-center mb-6">
                                <i data-lucide="trending-up" class="w-6 h-6 text-brand"></i>
                            </div>
                            <p class="text-gray-400 font-semibold mb-2 uppercase tracking-wider text-xs">Faturamento Total</p>
                            <h2 id="dash-total" class="text-4xl font-display font-black text-white">R$ 0,00</h2>
                        </div>
                        <div class="glass-card p-10 relative overflow-hidden">
                            <i data-lucide="users" class="absolute top-0 right-0 p-6 opacity-5 w-24 h-24"></i>
                            <div class="w-12 h-12 bg-accent/10 rounded-2xl flex items-center justify-center mb-6">
                                <i data-lucide="users" class="w-6 h-6 text-accent"></i>
                            </div>
                            <p class="text-gray-400 font-semibold mb-2 uppercase tracking-wider text-xs">Clientes Ativos</p>
                            <h2 id="dash-clientes" class="text-4xl font-display font-black text-white">0</h2>
                        </div>
                        <div class="glass-card p-10 relative overflow-hidden">
                            <i data-lucide="circle-dollar-sign" class="absolute top-0 right-0 p-6 opacity-5 w-24 h-24"></i>
                            <div class="w-12 h-12 bg-brand-light/10 rounded-2xl flex items-center justify-center mb-6">
                                <i data-lucide="circle-dollar-sign" class="w-6 h-6 text-brand-light"></i>
                            </div>
                            <p class="text-gray-400 font-semibold mb-2 uppercase tracking-wider text-xs">Faturas Geradas</p>
                            <h2 id="dash-faturas" class="text-4xl font-display font-black text-white">0</h2>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                        <div class="lg:col-span-2 glass-card p-10">
                            <h3 class="text-2xl font-display font-bold mb-10 italic">Fluxo de Receita</h3>
                            <div class="h-96 w-full">
                                <canvas id="revenueChart"></canvas>
                            </div>
                        </div>
                        <div class="glass-card p-10">
                            <h3 class="text-2xl font-display font-bold mb-8 italic">Atividade Recente</h3>
                            <div id="recent-activity" class="space-y-6">
                                <!-- Dynamic Content -->
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Clientes Screen -->
                <section id="screen-clientes" class="screen hidden space-y-12">
                    <div class="glass-card p-10">
                        <h3 class="text-2xl font-display font-bold mb-8 flex items-center gap-3 italic">
                            <i data-lucide="user-plus" class="w-6 h-6 text-brand"></i> Novo Cadastro
                        </h3>
                        <form onsubmit="handleSaveCliente(event)" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">
                            <input id="c-nome" placeholder="Nome Completo" class="input-field" required>
                            <input id="c-doc" placeholder="CPF ou CNPJ" class="input-field" required>
                            <input id="c-end" placeholder="Endereço" class="input-field" required>
                            <input id="c-whats" placeholder="WhatsApp" class="input-field" required>
                            <button type="submit" class="btn-primary flex items-center justify-center gap-3">
                                <i data-lucide="plus" class="w-6 h-6"></i> Cadastrar
                            </button>
                        </form>
                    </div>
                    <div id="clientes-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        <!-- Dynamic Content -->
                    </div>
                </section>

                <!-- Financeiro Screen -->
                <section id="screen-financeiro" class="screen hidden space-y-12">
                    <div class="glass-card p-10">
                        <h3 class="text-2xl font-display font-bold mb-8 italic">Lançar Fatura</h3>
                        <form onsubmit="handleSaveFatura(event)" class="grid grid-cols-1 md:grid-cols-4 gap-6">
                            <select id="f-cliente" class="input-field" required>
                                <option value="">Selecionar Cliente</option>
                            </select>
                            <input id="f-valor" type="number" step="0.01" placeholder="Valor R$" class="input-field" required>
                            <select id="f-status" class="input-field">
                                <option value="PENDENTE">PENDENTE</option>
                                <option value="PAGO">PAGO</option>
                                <option value="VENCIDO">VENCIDO</option>
                            </select>
                            <button type="submit" class="btn-primary flex items-center justify-center gap-3">
                                <i data-lucide="send" class="w-6 h-6"></i> Gerar & Notificar
                            </button>
                        </form>
                    </div>
                    <div class="glass-card overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-white/[0.02] text-gray-500 text-xs uppercase tracking-[0.2em] font-black border-b border-border">
                                        <th class="px-10 py-6">Cliente</th>
                                        <th className="px-10 py-6">Valor</th>
                                        <th className="px-10 py-6">Status</th>
                                        <th className="px-10 py-6">Data</th>
                                        <th className="px-10 py-6 text-right">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="faturas-table-body" class="divide-y divide-border">
                                    <!-- Dynamic Content -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </section>

            </div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- CONFIGURAÇÃO FIREBASE ---
        // Se você estiver usando o AI Studio, ele injeta o arquivo firebase-applet-config.json
        // Para um arquivo único, você deve colar as credenciais aqui se for usar fora do ambiente.
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_AUTH_DOMAIN",
            projectId: "SEU_PROJECT_ID",
            storageBucket: "SEU_STORAGE_BUCKET",
            messagingSenderId: "SEU_SENDER_ID",
            appId: "SEU_APP_ID"
        };

        // Tenta carregar do ambiente se disponível
        let config = firebaseConfig;
        try {
            const response = await fetch('./firebase-applet-config.json');
            if (response.ok) config = await response.json();
        } catch (e) {}

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // --- ESTADO GLOBAL ---
        let clientes = [];
        let faturas = [];
        let revenueChart = null;

        // --- AUTENTICAÇÃO ---
        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-layout').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('user-photo').src = user.photoURL;
                document.getElementById('welcome-msg').innerText = `Bem-vindo de volta, ${user.displayName.split(' ')[0]}!`;
                initListeners();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-layout').classList.add('hidden');
            }
        });

        // --- LISTENERS DE DADOS ---
        function initListeners() {
            // Clientes
            onSnapshot(query(collection(db, 'clientes'), orderBy('nome')), (snapshot) => {
                clientes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderClientes();
                updateFinanceiroSelect();
                updateDashboard();
            });

            // Faturas
            onSnapshot(query(collection(db, 'faturas'), orderBy('createdAt', 'desc')), (snapshot) => {
                faturas = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderFaturas();
                updateDashboard();
            });
        }

        // --- NAVEGAÇÃO ---
        window.showScreen = (screenId) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(`screen-${screenId}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-brand', 'text-white', 'shadow-xl');
                btn.classList.add('text-gray-500');
                if(btn.dataset.screen === screenId) {
                    btn.classList.add('bg-brand', 'text-white', 'shadow-xl');
                    btn.classList.remove('text-gray-500');
                }
            });

            document.getElementById('screen-title').innerText = screenId;
            toggleSidebar(false);
        };

        window.toggleSidebar = (show) => {
            const sidebar = document.getElementById('sidebar');
            if(show) sidebar.classList.remove('-translate-x-full');
            else sidebar.classList.add('-translate-x-full');
        };

        // --- OPERAÇÕES ---
        window.handleSaveCliente = async (e) => {
            e.preventDefault();
            const data = {
                nome: document.getElementById('c-nome').value,
                documento: document.getElementById('c-doc').value,
                endereco: document.getElementById('c-end').value,
                whats: document.getElementById('c-whats').value,
                createdAt: serverTimestamp()
            };
            try {
                await addDoc(collection(db, 'clientes'), data);
                e.target.reset();
            } catch (err) { alert("Erro ao salvar cliente."); }
        };

        window.handleSaveFatura = async (e) => {
            e.preventDefault();
            const clienteId = document.getElementById('f-cliente').value;
            const valor = parseFloat(document.getElementById('f-valor').value);
            const status = document.getElementById('f-status').value;
            const cliente = clientes.find(c => c.id === clienteId);

            if(!cliente) return;

            try {
                // Chamada para o Asaas (Backend)
                const response = await fetch('/api/gerar-boleto', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cliente, valor, status })
                });
                const asaasData = await response.json();

                if(!response.ok) throw new Error(asaasData.error);

                await addDoc(collection(db, 'faturas'), {
                    clienteId,
                    clienteNome: cliente.nome,
                    valor,
                    status,
                    asaasId: asaasData.id,
                    invoiceUrl: asaasData.invoiceUrl || asaasData.bankSlipUrl,
                    createdAt: serverTimestamp()
                });

                // WhatsApp
                const msg = `Olá ${cliente.nome}, sua fatura de R$ ${valor.toFixed(2)} foi gerada.\n\nLink: ${asaasData.invoiceUrl || asaasData.bankSlipUrl}`;
                window.open(`https://wa.me/${cliente.whats.replace(/\D/g, '')}?text=${encodeURIComponent(msg)}`, '_blank');

                e.target.reset();
                alert("Fatura gerada com sucesso!");
            } catch (err) { alert("Erro: " + err.message); }
        };

        window.deleteDocById = async (coll, id) => {
            if(confirm("Deseja excluir este registro?")) {
                await deleteDoc(doc(db, coll, id));
            }
        };

        // --- RENDERIZAÇÃO ---
        function renderClientes() {
            const container = document.getElementById('clientes-list');
            container.innerHTML = clientes.map(c => `
                <div class="glass-card p-8 group hover:border-brand/40 transition-all duration-500">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-16 h-16 bg-brand/10 rounded-2xl flex items-center justify-center text-brand font-display font-black text-2xl">${c.nome[0].toUpperCase()}</div>
                        <button onclick="deleteDocById('clientes', '${c.id}')" class="p-3 text-gray-600 hover:text-red-400 hover:bg-red-500/10 rounded-xl transition-all">
                            <i data-lucide="trash-2" class="w-6 h-6"></i>
                        </button>
                    </div>
                    <h4 class="text-2xl font-display font-bold text-white mb-2 group-hover:text-brand transition-colors">${c.nome}</h4>
                    <div class="space-y-3 mb-8 text-gray-500 text-sm font-medium">
                        <p>Doc: ${c.documento}</p>
                        <p>${c.endereco}</p>
                        <p>${c.whats}</p>
                    </div>
                    <a href="https://wa.me/${c.whats.replace(/\D/g, '')}" target="_blank" class="w-full flex items-center justify-center gap-3 py-4 bg-white/5 rounded-2xl text-sm font-bold hover:bg-brand hover:text-white transition-all">
                        <i data-lucide="send" class="w-4 h-4"></i> Enviar Mensagem
                    </a>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderFaturas() {
            const tbody = document.getElementById('faturas-table-body');
            tbody.innerHTML = faturas.map(f => `
                <tr class="hover:bg-white/[0.02] transition-colors group">
                    <td class="px-10 py-6">
                        <p class="font-bold text-white group-hover:text-brand transition-colors">${f.clienteNome}</p>
                        <p class="text-[10px] text-gray-600 font-mono mt-0.5 uppercase">ID: ${f.id.slice(0,8)}</p>
                    </td>
                    <td class="px-10 py-6"><span class="text-white font-display font-bold text-lg">R$ ${f.valor.toFixed(2)}</span></td>
                    <td class="px-10 py-6">
                        <span class="text-[10px] font-black px-3 py-1.5 rounded-lg uppercase tracking-widest ${f.status === 'PAGO' ? 'bg-accent/10 text-accent border border-accent/20' : f.status === 'VENCIDO' ? 'bg-red-500/10 text-red-400 border border-red-500/20' : 'bg-yellow-500/10 text-yellow-400 border border-yellow-500/20'}">
                            ${f.status}
                        </span>
                    </td>
                    <td class="px-10 py-6 text-gray-500 text-sm font-medium">${f.createdAt ? new Date(f.createdAt.seconds * 1000).toLocaleDateString('pt-BR') : 'Agora'}</td>
                    <td class="px-10 py-6 text-right">
                        <div class="flex items-center justify-end gap-3">
                            ${f.invoiceUrl ? `<a href="${f.invoiceUrl}" target="_blank" class="p-3 text-brand hover:bg-brand/10 rounded-xl transition-all"><i data-lucide="dollar-sign" class="w-6 h-6"></i></a>` : ''}
                            <button onclick="deleteDocById('faturas', '${f.id}')" class="p-3 text-gray-600 hover:text-red-400 hover:bg-red-500/10 rounded-xl transition-all">
                                <i data-lucide="trash-2" class="w-6 h-6"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function updateFinanceiroSelect() {
            const select = document.getElementById('f-cliente');
            const currentVal = select.value;
            select.innerHTML = '<option value="">Selecionar Cliente</option>' + 
                clientes.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
            select.value = currentVal;
        }

        function updateDashboard() {
            const total = faturas.reduce((sum, f) => sum + f.valor, 0);
            document.getElementById('dash-total').innerText = `R$ ${total.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            document.getElementById('dash-clientes').innerText = clientes.length;
            document.getElementById('dash-faturas').innerText = faturas.length;

            const recent = faturas.slice(0, 5).map(f => `
                <div class="flex items-center justify-between p-5 bg-white/[0.03] rounded-2xl border border-white/5 hover:bg-white/[0.06] transition-all group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center ${f.status === 'PAGO' ? 'bg-accent/10 text-accent' : 'bg-yellow-500/10 text-yellow-400'}">
                            <i data-lucide="dollar-sign" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <p class="font-bold text-white group-hover:text-brand transition-colors">${f.clienteNome}</p>
                            <p class="text-xs text-gray-500 font-medium">R$ ${f.valor.toFixed(2)}</p>
                        </div>
                    </div>
                    <span class="text-[10px] font-black px-2.5 py-1 rounded-lg uppercase tracking-wider ${f.status === 'PAGO' ? 'bg-accent/20 text-accent' : 'bg-yellow-500/20 text-yellow-400'}">${f.status}</span>
                </div>
            `).join('');
            document.getElementById('recent-activity').innerHTML = recent || '<p class="text-gray-500 text-center py-10 italic">Nenhuma atividade.</p>';
            lucide.createIcons();
            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            const statusData = {
                'PENDENTE': faturas.filter(f => f.status === 'PENDENTE').reduce((s, f) => s + f.valor, 0),
                'PAGO': faturas.filter(f => f.status === 'PAGO').reduce((s, f) => s + f.valor, 0),
                'VENCIDO': faturas.filter(f => f.status === 'VENCIDO').reduce((s, f) => s + f.valor, 0)
            };

            if (revenueChart) revenueChart.destroy();
            revenueChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Pendente', 'Pago', 'Vencido'],
                    datasets: [{
                        label: 'Valor (R$)',
                        data: [statusData.PENDENTE, statusData.PAGO, statusData.VENCIDO],
                        backgroundColor: ['#fbbf24', '#10b981', '#ef4444'],
                        borderRadius: 12,
                        barThickness: 50
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#4b5563' } },
                        x: { grid: { display: false }, ticks: { color: '#4b5563' } }
                    }
                }
            });
        }

        // Inicializa ícones
        lucide.createIcons();
        showScreen('dashboard');
    </script>
</body>
</html>
